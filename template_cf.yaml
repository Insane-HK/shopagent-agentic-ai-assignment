AWSTemplateFormatVersion: '2010-09-09'
Description: ShopAgent — AI customer support (Lambda + HTTP API + Bedrock)

Parameters:
  S3Bucket:
    Type: String
  S3Key:
    Type: String
  BedrockModelId:
    Type: String
    Default: "amazon.nova-pro-v1:0"
  StageName:
    Type: String
    Default: prod

Resources:

  # ── IAM Role ──────────────────────────────────────────────
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "shopagent-role-${StageName}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/*"

  # ── Lambda Function ───────────────────────────────────────
  ShopAgentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "shopagent-${StageName}"
      Runtime: python3.12
      Handler: lambda_handler.handler
      Code:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref S3Key
      MemorySize: 512
      Timeout: 60
      Role: !GetAtt LambdaRole.Arn
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          PYTHONPATH: /var/task
          STAGE_NAME: !Sub "/${StageName}"

  # ── HTTP API Gateway ──────────────────────────────────────
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "shopagent-api-${StageName}"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  # ── API Stage ─────────────────────────────────────────────
  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: !Ref StageName
      AutoDeploy: true

  # ── Lambda Integration ────────────────────────────────────
  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ShopAgentFunction.Arn
      PayloadFormatVersion: "2.0"

  # ── Routes ────────────────────────────────────────────────
  RootRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /"
      Target: !Sub "integrations/${LambdaIntegration}"

  ProxyRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "$default"
      Target: !Sub "integrations/${LambdaIntegration}"

  # ── Lambda Permission ────────────────────────────────────
  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ShopAgentFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*"

  # ── Log Group ─────────────────────────────────────────────
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/shopagent-${StageName}"
      RetentionInDays: 7

Outputs:
  ApiUrl:
    Description: Live API URL
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/"
  FunctionName:
    Description: Lambda function name
    Value: !Ref ShopAgentFunction
