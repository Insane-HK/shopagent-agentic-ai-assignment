<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ShopAgent — AI-powered customer support for your orders and products." />
  <title>ShopAgent — Customer Support</title>
  <link rel="stylesheet" href="static/style.css?v=3" />
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">◈</span>
      <span class="brand-name">ShopAgent</span>
    </div>

    <button class="btn-new-chat" id="newChatBtn">+ New Chat</button>

    <div class="sidebar-section-label">Recent</div>
    <ul class="history-list" id="historyList">
      <li class="history-empty">No conversations yet</li>
    </ul>

    <div class="sidebar-footer">
      <button class="btn-clear" id="clearBtn" title="Clear history">Clear history</button>
      <span class="version-tag">v1.0 · Bedrock</span>
    </div>
  </aside>

  <main class="main" id="main">

    <header class="topbar">
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-title">ShopAgent — AI Customer Support</div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
      <div class="status-dot" id="statusDot" title="Connected"></div>
    </header>

    <section class="conversation" id="conversation">
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-icon">◈</div>
        <h1 class="welcome-title">How can I help you?</h1>
        <p class="welcome-sub">Ask about your orders, track shipments, or explore our product catalog.</p>
        <div class="suggestion-row">
          <button class="suggestion-chip" data-q="Where is my order ORD-1002?">Track ORD-1002</button>
          <button class="suggestion-chip" data-q="Do you have noise-cancelling headphones?">Find headphones</button>
          <button class="suggestion-chip" data-q="Show me bags under $100">Bags under $100</button>
          <button class="suggestion-chip" data-q="What happened to order ORD-1003?">Order ORD-1003 status</button>
        </div>
      </div>

      <div class="messages" id="messages"></div>
    </section>

    <footer class="input-area">
      <form class="input-form" id="chatForm" autocomplete="off">
        <div class="input-wrapper">
          <textarea
            id="questionInput"
            class="question-input"
            placeholder="Ask about an order or product…"
            rows="1"
            maxlength="500"
          ></textarea>
          <button type="submit" class="ask-btn" id="askBtn">
            <span class="ask-label">Ask</span>
            <span class="ask-spinner" id="askSpinner" hidden>
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="31.4" stroke-dashoffset="10"/>
              </svg>
            </span>
          </button>
        </div>
        <div class="input-meta">
          <span class="char-count" id="charCount">0 / 500</span>
          <span class="powered-by">Powered by Nova Pro on Bedrock</span>
        </div>
      </form>
    </footer>

  </main>

  <script src="static/app.js?v=3"></script>
</body>
</html>
